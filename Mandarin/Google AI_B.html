<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="Big5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古詩詞猜謎小遊戲</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #f5f2eb;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #d4af37;
        }
        .timer-box {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 20px;
            border: 2px solid #e74c3c;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background-color: #fadbd8;
        }
        .question-type {
            font-size: 18px;
            color: #7f8c8d;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .question-content {
            font-size: 22px;
            margin: 20px 0;
            line-height: 1.6;
            font-weight: bold;
        }
        .answer-box {
            background-color: #f9f9f9;
            border-left: 5px solid #2ecc71;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            display: none;
            border-radius: 4px;
        }
        .answer-box p {
            margin: 5px 0;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }
        .btn-show {
            background-color: #3498db;
            color: white;
        }
        .btn-show:hover { background-color: #2980b9; }
        .btn-next {
            background-color: #2ecc71;
            color: white;
        }
        .btn-next:hover { background-color: #27ae60; }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #message {
            color: red;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="timer-box">剩餘時間：<span id="timer">30</span> 秒</div>
    <div id="game-body">
        <div class="question-type" id="q-type">正在載入題庫...</div>
        <div class="question-content" id="q-text">請稍候</div>
        
        <div class="answer-box" id="answer-area">
            <p><strong>【正確答案】</strong></p>
            <p><strong>詩名：</strong><span id="ans-title"></span></p>
            <p><strong>作者：</strong><span id="ans-author"></span></p>
            <p><strong>完整詩句：</strong></p>
            <p id="ans-poem" style="white-space: pre-line; color: #2c3e50; font-weight: bold;"></p>
        </div>

        <div id="timeout-msg" style="color: #e74c3c; font-weight: bold; font-size: 20px; margin: 10px 0; display: none;">時間到！</div>

        <div class="btn-group">
            <button class="btn-show" id="btn-answer" onclick="showAnswer()" disabled>顯示答案</button>
            <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>下一題</button>
        </div>
    </div>
    <div id="message"></div>
</div>

<script>
    let poemDatabase = [];
    let currentPoem = null;
    let currentType = 0; // 1: 填空, 2: 詩人, 3: 詩名
    let questionCount = 0;
    
    let timerInterval = null;
    let timeLeft = 30;

    // 網頁載入後自動讀取 CSV
    window.onload = function() {
        fetch('Poems.csv')
            .then(response => {
                if (!response.ok) {
                    throw new Error('找不到 Poems.csv 檔案，請確認檔案路徑。');
                }
                return response.text();
            })
            .then(text => {
                parseCSV(text);
                if(poemDatabase.length > 0) {
                    document.getElementById('btn-answer').disabled = false;
                    document.getElementById('btn-next').disabled = false;
                    nextQuestion();
                } else {
                    document.getElementById('q-type').innerText = "題庫內容為空";
                }
            })
            .catch(error => {
                document.getElementById('q-type').innerText = "錯誤";
                document.getElementById('q-text').innerText = error.message;
            });
    };

    // 解析 CSV 內容
    function parseCSV(text) {
        let lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === '') continue;
            
            // 依據逗號分割：詩名, 作者, 詩句
            let parts = line.split(',');
            if (parts.length >= 3) {
                poemDatabase.push({
                    title: parts[0].trim(),
                    author: parts[1].trim(),
                    poem: parts[2].trim()
                });
            }
        }
    }

    // 開始倒數計時
    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 30;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('timeout-msg').style.display = 'none';
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timeout-msg').style.display = 'block';
                showAnswer(); // 時間到自動顯示答案
            }
        }, 1000);
    }

    // 生成新題目
    function nextQuestion() {
        if (poemDatabase.length === 0) return;
        
        questionCount++;
        clearInterval(timerInterval);
        
        // 隱藏答案區
        document.getElementById('answer-area').style.display = 'none';
        document.getElementById('timeout-msg').style.display = 'none';

        // 隨機抽選一首詩與一種題型
        currentPoem = poemDatabase[Math.floor(Math.random() * poemDatabase.length)];
        currentType = Math.floor(Math.random() * 3) + 1; // 1~3 隨機

        let typeName = "";
        let questionText = "";

        switch(currentType) {
            case 1:
                typeName = `題目作答：填空題`;
                questionText = generateBlankQuestion(currentPoem.poem);
                break;
            case 2:
                typeName = `題目作答：詩人猜謎`;
                questionText = `請問下列這句詩詞出自哪位作者？<br>「${currentPoem.poem}」`;
                break;
            case 3:
                typeName = `題目作答：詩名猜謎`;
                questionText = `請問下列這句詩詞的詩詞名稱是什麼？<br>「${currentPoem.poem}」`;
                break;
        }

        // 更新介面
        document.getElementById('q-type').innerText = `第 ${questionCount} 題 ── ${typeName}`;
        document.getElementById('q-text').innerHTML = questionText;

        // 設定答案內容預備
        document.getElementById('ans-title').innerText = currentPoem.title;
        document.getElementById('ans-author').innerText = currentPoem.author;
        document.getElementById('ans-poem').innerText = currentPoem.poem;

        // 啟動計時
        startTimer();
    }

    // 填空題邏輯：隨機挖空至少2個字以上（連續字）
    function generateBlankQuestion(poemText) {
        // 過濾掉標點符號，只計算純中文字數，以利隨機挖空
        let cleanText = poemText.replace(/[，。？！、；：]/g, "");
        
        if (cleanText.length < 2) {
            return `請補全詩句：「${poemText}」`; // 字數太短不挖空
        }

        // 隨機決定挖空長度（最少2個字，最多不超過總長度的一半或4個字，這裡設定為2到4字之間）
        let maxBlank = Math.min(4, Math.floor(cleanText.length / 2));
        if (maxBlank < 2) maxBlank = 2;
        let blankLength = Math.floor(Math.random() * (maxBlank - 2 + 1)) + 2;

        // 隨機選取開始挖空的位置
        let startIndex = Math.floor(Math.random() * (cleanText.length - blankLength + 1));
        let targetString = cleanText.substr(startIndex, blankLength);

        // 將原本帶有標點符號的詩句中的目標連續字替換為底線
        let underline = "＿".repeat(blankLength);
        let finalQuestion = poemText.replace(targetString, underline);

        return `請補全詩句：「${finalQuestion}」<br><small style='color:gray; font-size:14px;'>(提示：空缺處共 ${blankLength} 個字)</small>`;
    }

    // 顯示答案
    function showAnswer() {
        clearInterval(timerInterval);
        document.getElementById('answer-area').style.display = 'block';
    }
</script>

</body>
</html>
