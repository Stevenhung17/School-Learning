<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>詩詞小遊戲</title>
<style>
  body { font-family: "Microsoft JhengHei", sans-serif; text-align: center; margin: 40px; }
  #question { font-size: 20px; margin: 20px; }
  #timer { font-size: 24px; color: red; margin: 10px; }
  #score { font-size: 22px; color: green; margin: 10px; }
  button { margin: 10px; padding: 10px 20px; font-size: 16px; }
  #answer { margin-top: 20px; font-size: 18px; color: blue; }
</style>
</head>
<body>
<h1>詩詞小遊戲</h1>
<div id="score">分數：0</div>
<div id="question"></div>
<div id="timer"></div>
<button id="showAnswer">顯示答案</button>
<button id="nextQuestion">下一題</button>
<div id="answer"></div>

<script>
let poems = [
  { title: "登山詩", author: "明‧唐寅", content: "一上一上又一上，一上直到高山上。舉頭紅日白雲低，四海五湖皆一望。" },
  { title: "和張僕射塞下曲·其三", author: "唐‧盧綸", content: "月黑雁飛高，單于夜遁逃。欲將輕騎逐，大雪滿弓刀。" },
  { title: "新嫁娘", author: "唐‧王建", content: "三日入廚下，洗手作羹湯；未諳姑食性，先遣小姑嘗。" },
  { title: "八陣圖", author: "唐‧杜甫", content: "功蓋三分國，名成八陣圖。江流石不轉，遺恨失吞吳。" },
  { title: "道上行", author: "宋‧楊萬里", content: "城中雪一尺，山中雪一丈。地上都已消，卻在松梢上。" },
  { title: "終南望餘雪", author: "唐‧祖詠", content: "終南陰嶺秀，積雪浮雲端；林表明霽色，城中增暮寒。" },
  { title: "宿建德江", author: "唐‧孟浩然", content: "移舟泊煙渚，日暮客愁新。野曠天低樹，江清月近人。" },
  { title: "送靈澈", author: "唐‧劉長卿", content: "蒼蒼竹林寺，杳杳鐘聲晚。荷笠帶斜陽，青山獨歸遠。" },
  { title: "秋夜寄邱員外", author: "唐‧韋應物", content: "懷君屬秋夜，散步詠涼天。空山松子落，幽人應未眠。" },
  { title: "問劉十九", author: "唐‧白居易", content: "綠螘新醅酒，紅泥小火爐。晚來天欲雪，能飲一杯無？" },
  { title: "尋隱者不遇", author: "唐‧賈島", content: "松下問童子，言師採藥去。只在此山中，雲深不知處。" },
  { title: "渡漢江", author: "唐‧李頻", content: "嶺外音書絕，經冬復歷春。近鄉情更怯，不敢問來人。" },
  { title: "哥舒歌", author: "唐‧西鄙人", content: "北斗七星高，哥舒夜帶刀。至今窺牧馬，不敢過臨洮。" },
  { title: "詠鵝", author: "唐‧駱賓王", content: "鵝，鵝，鵝，曲項向天歌。白毛浮綠水，紅掌撥清波。" },
  { title: "長干行·其一", author: "唐‧崔顥", content: "君家何處住，妾住在橫塘。停船暫借問，或恐是同鄉。" },
  { title: "送崔九	", author: "唐‧裴迪", content: "歸山深淺去，須盡丘壑美。莫學武陵人，暫游桃源裡。" },
  { title: "京師得家書", author: "明‧袁凱", content: "江水三千里，家 書十五行。行行無別語，只道早還鄉。" },
  { title: "無題", author: "佚名", content: "一去二三里，煙村四五家。亭臺六七座，八九十枝花。" },
  { title: "江南可採蓮", author: "漢‧佚名", content: "江南可採蓮，蓮葉何田田，魚戲蓮葉間。魚戲蓮葉東，魚戲蓮葉西，魚戲蓮葉南，魚戲蓮葉北。" },
  { title: "彈琴", author: "唐‧劉長卿", content: "泠泠七弦上，靜聽松風寒。古調雖自愛，今人多不彈。" }
];

let timerInterval;
let timeLeft = 30;
let score = 0;
let currentPoem = null;
let answered = false;

function updateScore() {
  document.getElementById("score").innerText = "分數：" + score;
}

function newQuestion() {
  clearInterval(timerInterval);
  document.getElementById("answer").innerHTML = "";
  answered = false;
  timeLeft = 30;
  document.getElementById("timer").innerText = "倒數：" + timeLeft + " 秒";
  timerInterval = setInterval(countdown, 1000);

  currentPoem = poems[Math.floor(Math.random() * poems.length)];
  let type = Math.floor(Math.random() * 3); // 0填空,1詩人,2詩名
  let questionText = "";

  if (type === 0) {
    // 填空題
    let content = currentPoem.content;
    let start = Math.floor(Math.random() * (content.length - 2));
    let len = Math.floor(Math.random() * 2) + 2; // 至少2字
    let blank = content.substr(start, len);
    let display = content.replace(blank, "＿＿");
    questionText = "題目：填空題<br>請補全詩句：「" + display + "」";
  } else if (type === 1) {
    // 詩人猜謎
    questionText = "題目：詩人猜謎<br>請問下列這句詩詞出自哪位作者？<br>「" + currentPoem.content + "」";
  } else {
    // 詩名猜謎
    questionText = "題目：詩名猜謎<br>請問下列這句詩詞的詩詞名稱是什麼？<br>「" + currentPoem.content + "」";
  }

  document.getElementById("question").innerHTML = questionText;

  document.getElementById("showAnswer").onclick = () => showAnswer(currentPoem, true);
  document.getElementById("nextQuestion").onclick = () => newQuestion();
}

function showAnswer(poem, userTriggered=false) {
  if (!answered) {
    answered = true;
    clearInterval(timerInterval);
    if (userTriggered) {
      score += 10; // 答對加分
    } else {
      score -= 5; // 時間到扣分
    }
    updateScore();
  }
  document.getElementById("answer").innerHTML =
    "答案：<br>詩名：《" + poem.title + "》<br>作者：" + poem.author + "<br>詩句：" + poem.content;
}

function countdown() {
  timeLeft--;
  document.getElementById("timer").innerText = "倒數：" + timeLeft + " 秒";
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    document.getElementById("timer").innerText = "時間到！";
    showAnswer(currentPoem, false);
  }
}

// 初始化第一題
newQuestion();
</script>
</body>
</html>
