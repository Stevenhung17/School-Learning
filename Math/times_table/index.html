<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小冒險家的九九乘法表</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #e0f2fe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 原生紙花畫布 */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .game-container {
            width: 90%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
            border: 6px solid #bae6fd;
            text-align: center;
            position: relative;
            z-index: 5;
            max-height: 95vh; /* 避免歷史紀錄太長超出畫面 */
            overflow-y: auto;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #475569;
        }
        .hearts {
            color: #ef4444;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }
        .badge {
            background-color: #fef08a;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #facc15;
            font-size: 1.1rem;
        }

        .progress-container {
            width: 100%;
            background-color: #f1f5f9;
            height: 20px;
            border-radius: 50px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            border: 2px solid #cbd5e1;
        }
        .progress-bar {
            width: 0%; 
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 50px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .timer-box {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0284c7;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }
        .timer-box.danger {
            color: #ef4444;
            transform: scale(1.3);
            animation: blink 0.5s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .question-box {
            background-color: #f0fdf4;
            border: 3px dashed #4ade80;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .story-text {
            font-size: 1.2rem;
            color: #16a34a;
            margin-bottom: 10px;
            height: 1.5em;
        }
        .question-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: #1e293b;
            letter-spacing: 5px;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .option-btn {
            background-color: #fef08a;
            border: none;
            border-bottom: 6px solid #facc15;
            border-radius: 15px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #713f12;
            padding: 15px 0;
            cursor: pointer;
            transition: transform 0.1s, border-bottom 0.1s;
        }
        .option-btn:active {
            transform: translateY(4px);
            border-bottom: 2px solid #facc15;
        }
        .option-btn:hover {
            background-color: #fef9c3;
        }

        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 10;
        }
        .feedback-overlay.correct {
            background-color: rgba(34, 197, 94, 0.9);
            opacity: 1;
        }
        .feedback-overlay.wrong {
            background-color: rgba(239, 68, 68, 0.9);
            opacity: 1;
        }
        .feedback-sub {
            font-size: 1.5rem;
            margin-top: 10px;
            text-align: center;
            line-height: 1.6;
        }

        /* 📊 歷史紀錄專用可愛樣式 */
        .history-box {
            margin-top: 20px;
            background-color: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 15px;
            padding: 10px;
            max-height: 130px;
            overflow-y: auto;
        }
        .history-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 8px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .history-item {
            background-color: #e2e8f0;
            color: #334155;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: bold;
        }
        .history-item.latest {
            background-color: #bfdbfe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="game-container">
        <div id="feedback" class="feedback-overlay"></div>
        
        <div class="header-bar">
            <div id="hearts" class="hearts">❤️ ❤️ ❤️ ❤️ ❤️</div>
            <div class="level-title">乘法挑戰賽 🚀</div>
            <div id="score-badge" class="badge">💰 分數: 0</div>
        </div>

        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>

        <div id="timer" class="timer-box">⏱️ 倒數：15 秒</div>

        <div class="question-box">
            <div id="story" class="story-text">載入中...</div>
            <div id="question" class="question-text">? × ? = ？</div>
        </div>

        <div class="options-container">
            <button class="option-btn" onclick="checkAnswer(this)">0</button>
            <button class="option-btn" onclick="checkAnswer(this)">0</button>
            <button class="option-btn" onclick="checkAnswer(this)">0</button>
        </div>
    </div>

    <script>
        // --- 1. 定義音效物件 ---
        const sounds = {
            correct: new Audio('correct.mp3'),
            wrong: new Audio('wrong.mp3'),
            win: new Audio('win.mp3'),
            countdown: new Audio('countdown.mp3')
        };
        
        function playSound(type) {
            try {
                sounds[type].play().catch(e => console.log("音效暫未就緒。"));
            } catch(e) {}
        }

        function stopSound(type) {
            try {
                sounds[type].pause();
                sounds[type].currentTime = 0;
            } catch(e) {}
        }

        // --- 2. 遊戲狀態變數 ---
        let solvedCount = 0;     
        let totalQuestions = 10; 
        let totalScore = 0;      
        let combo = 0;           
        let num1 = 0;           
        let num2 = 0;           
        let correctAnswer = 0;  
        let lives = 5;           
        
        let timeLeft = 15;       
        let timerInterval = null; 
        let isAnswering = false;  

        const stories = [
            "🐰 幫小兔子算算看總共有幾個呢？",
            "🐱 小貓咪想要得到這個數字的罐罐！",
            "🐻 小熊隊長說：算出答案就能得到寶藏！",
            "🚀 太空船能源不足了，請幫忙充電！",
            "🎈 啪！把對的氣球打破吧！"
        ];

        // --- 3. 啟動計時器函數 ---
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 15; 
            isAnswering = false;
            
            stopSound('countdown');
            
            const timerEl = document.getElementById('timer');
            timerEl.innerText = `⏱️ 倒數：${timeLeft} 秒`;
            timerEl.className = "timer-box"; 

            timerInterval = setInterval(() => {
                if (isAnswering) return; 

                timeLeft--;
                timerEl.innerText = `⏱️ 倒數：${timeLeft} 秒`;

                if (timeLeft <= 5 && timeLeft > 0) {
                    timerEl.className = "timer-box danger";
                    playSound('countdown'); 
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeOut();
                }
            }, 1000);
        }

        // --- 4. 時間到的處理邏輯 ---
        function handleTimeOut() {
            isAnswering = true;
            combo = 0; 
            
            stopSound('countdown');
            playSound('wrong'); 

            lives--;
            updateHearts();

            const feedbackEl = document.getElementById('feedback');
            feedbackEl.innerHTML = "⏰ 時間到囉！<br><div class='feedback-sub'>沒關係，下一題看快一點喔！</div>";
            feedbackEl.className = "feedback-overlay wrong";

            setTimeout(() => {
                feedbackEl.className = "feedback-overlay";
                generateQuestion();
            }, 3000);
        }

        // --- 5. 遊戲隨機出題 ---
        function generateQuestion() {
            if (solvedCount >= totalQuestions) {
                clearInterval(timerInterval); 
                saveAndShowScores(true); // 🎯 破關，去儲存並結算
                return;
            }
            if (lives <= 0) {
                clearInterval(timerInterval); 
                saveAndShowScores(false); // 🎯 沒命，去儲存並結算
                return;
            }

            num1 = Math.floor(Math.random() * 8) + 2;
            num2 = Math.floor(Math.random() * 8) + 2;
            correctAnswer = num1 * num2;

            document.getElementById('question').innerText = `${num1} × ${num2} = ?`;
            const randomStory = stories[Math.floor(Math.random() * stories.length)];
            document.getElementById('story').innerText = randomStory;

            let options = [correctAnswer];
            while (options.length < 3) {
                let wrongAns = correctAnswer + (Math.floor(Math.random() * 7) - 3);
                if (wrongAns > 0 && !options.includes(wrongAns)) {
                    options.push(wrongAns);
                }
            }
            options.sort(() => Math.random() - 0.5);

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, index) => {
                btn.innerText = options[index];
            });

            startTimer();
        }

        // --- 6. 檢查答案與計算分數 ---
        function checkAnswer(clickedButton) {
            if (isAnswering) return; 
            isAnswering = true; 
            
            clearInterval(timerInterval); 
            stopSound('countdown');

            const userAnswer = parseInt(clickedButton.innerText);
            const feedbackEl = document.getElementById('feedback');

            if (userAnswer === correctAnswer) {
                playSound('correct'); 
                solvedCount++;
                combo++; 
                
                let basePoints = 10;                  
                let speedBonus = timeLeft * 5;        
                let comboBonus = (combo > 1) ? (combo - 1) * 2 : 0; 
                let thisTurnScore = basePoints + speedBonus + comboBonus;
                
                totalScore += thisTurnScore; 
                
                document.getElementById('score-badge').innerText = `💰 分數: ${totalScore}`;
                
                let progressPercent = (solvedCount / totalQuestions) * 100;
                document.getElementById('progress').style.width = `${progressPercent}%`;

                let comboText = combo > 1 ? `<span style='color:#facc15;'>🔥 ${combo} 連擊！</span><br>` : "";
                feedbackEl.innerHTML = `🎉 太棒了！<br><div class='feedback-sub'>${comboText}得 ${thisTurnScore} 分！<br>(速度獎勵 +${speedBonus})</div>`;
                feedbackEl.className = "feedback-overlay correct";
            } else {
                playSound('wrong');
                lives--;
                combo = 0; 
                updateHearts();
                
                feedbackEl.innerHTML = `💡 再試一次！<br><div class='feedback-sub'>連擊中斷了！<br>想想看：把 ${num1} 加 ${num2} 次喔！</div>`;
                feedbackEl.className = "feedback-overlay wrong";
            }

            setTimeout(() => {
                feedbackEl.className = "feedback-overlay";
                generateQuestion();
            }, 3000);
        }

        // --- 7. 更新愛心血條 ---
        function updateHearts() {
            let heartString = "";
            for (let i = 0; i < 5; i++) {
                if (i < lives) {
                    heartString += "❤️ ";
                } else {
                    heartString += "🖤 ";
                }
            }
            document.getElementById('hearts').innerText = heartString;
        }

        // --- 🎯 8. 核心：儲存當前成績並生成歷史分數 HTML 區塊 ---
        function saveAndShowScores(isWin) {
            // 從 sessionStorage 讀取歷次分數，如果沒有就建立新陣列
            let scoreHistory = JSON.parse(sessionStorage.getItem('multiply_history')) || [];
            
            // 把這次的分數丟進紀錄裡
            scoreHistory.push(totalScore);
            
            // 存回 sessionStorage
            sessionStorage.setItem('multiply_history', JSON.stringify(scoreHistory));

            // 製造歷史紀錄的可愛標籤 HTML
            let historyHtml = `
                <div class="history-box">
                    <div class="history-title">📊 我的冒險紀錄 (關閉網頁會重置喔)</div>
                    <ul class="history-list">
            `;
            
            scoreHistory.forEach((s, idx) => {
                // 如果是最後一次（也就是剛剛玩的這一次），特別上藍色標記
                if (idx === scoreHistory.length - 1) {
                    historyHtml += `<li class="history-item latest">第 ${idx + 1} 次: ${s}分 (本次)</li>`;
                } else {
                    historyHtml += `<li class="history-item">第 ${idx + 1} 次: ${s}分</li>`;
                }
            });
            historyHtml += `</ul></div>`;

            // 根據輸贏顯示對應網頁畫面
            if (isWin) {
                showFinalCelebration(historyHtml);
            } else {
                showGameOver(historyHtml);
            }
        }

        // --- 9. 終極破關畫面 ---
        function showFinalCelebration(historyHtml) {
            playSound('win');
            startLocalConfetti(); 

            let rank = "👑 乘法大師";
            if (totalScore >= 700) rank = "⚡ 閃電乘法俠 (神速！)";
            else if (totalScore >= 450) rank = "🦁 乘法小勇士 (超棒！)";
            else rank = "🍀 潛力小新星 (繼續加油！)";

            const container = document.querySelector('.game-container');
            container.innerHTML = `
                <h1 style="font-size: 2.5rem; color: #16a34a; margin: 10px 0;">🏆 大成功！</h1>
                <div style="background-color: #fef08a; padding: 12px; border-radius: 20px; border: 3px solid #facc15; margin-bottom: 15px;">
                    <p style="font-size: 1.3rem; color: #713f12; margin: 0;">✨ 最終總分數 ✨</p>
                    <p style="font-size: 3rem; font-weight: 900; color: #b45309; margin: 5px 0;">${totalScore} 分</p>
                    <p style="font-size: 1.2rem; font-weight: bold; color: #15803d; margin: 0;">獲得稱號：${rank}</p>
                </div>
                <button onclick="location.reload()" style="background-color: #4ade80; border: none; border-bottom: 5px solid #22c55e; padding: 12px 25px; font-size: 1.3rem; color: white; border-radius: 15px; cursor: pointer; font-weight:bold;">再玩一次挑戰高分 🔄</button>
                ${historyHtml}
            `;
        }

        // --- 10. 遊戲結束畫面 ---
        function showGameOver(historyHtml) {
            const container = document.querySelector('.game-container');
            container.innerHTML = `
                <h1 style="font-size: 2.5rem; color: #ef4444; margin: 10px 0;">👍 很努力囉！</h1>
                <div style="background-color: #f1f5f9; padding: 12px; border-radius: 20px; margin-bottom: 15px;">
                    <p style="font-size: 1.1rem; color: #475569; margin: 0;">這次的得分</p>
                    <p style="font-size: 2.2rem; font-weight: 900; color: #475569; margin: 5px 0;">${totalScore} 分</p>
                </div>
                <button onclick="location.reload()" style="background-color: #38bdf8; border: none; border-bottom: 5px solid #0284c7; padding: 12px 25px; font-size: 1.3rem; color: white; border-radius: 15px; cursor: pointer; font-weight:bold;">重新挑戰 🚀</button>
                ${historyHtml}
            `;
        }

        // --- 🚀 原生手寫紙花動畫引擎 ---
        function startLocalConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7', '#ff7849'];

            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();
                });

                if (particles.some(p => p.y < canvas.height)) {
                    requestAnimationFrame(draw);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            draw();
        }

        generateQuestion();
    </script>
</body>
</html>
