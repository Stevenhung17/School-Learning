<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小冒險家的九九乘法表</title>
    <style>
        /* 1. 全域重設與背景：使用可愛的粉藍色 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #e0f2fe; /* 溫柔的粉藍底 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. 遊戲主舞台：像一台遊戲機或卡片 */
        .game-container {
            width: 90%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 30px; /* 圓角讓視覺更溫和 */
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            padding: 30px;
            box-sizing: border-box;
            border: 6px solid #bae6fd; /* 天藍色粗邊框 */
            text-align: center;
        }

        /* 3. 頂部資訊欄（血條、關卡、徽章） */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #475569;
        }
        .hearts {
            color: #ef4444; /* 紅色愛心 */
            font-size: 1.5rem;
        }
        .badge {
            background-color: #fef08a; /* 黃色徽章背景 */
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #facc15;
        }

        /* 4. 進度條：小汽車賽跑的感覺 */
        .progress-container {
            width: 100%;
            background-color: #f1f5f9;
            height: 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            border: 2px solid #cbd5e1;
        }
        .progress-bar {
            width: 40%; /* 這裡控制進度 % */
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e); /* 綠色漸層 */
            border-radius: 50px;
            transition: width 0.3s ease; /* 讓前進時有動畫效果 */
        }

        /* 5. 題目顯示區：字體一定要超級大 */
        .question-box {
            background-color: #f0fdf4; /* 淡淡的蘋果綠 */
            border: 3px dashed #4ade80;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .story-text {
            font-size: 1.2rem;
            color: #16a34a;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 3.5rem; /* 超大題目字體 */
            font-weight: 900;
            color: #1e293b;
            letter-spacing: 5px;
        }

        /* 6. 選項按鈕區（多選一） */
        .options-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 三欄佈局 */
            gap: 15px;
        }
        .option-btn {
            background-color: #fef08a; /* 亮黃色按鈕 */
            border: none;
            border-bottom: 6px solid #facc15; /* 做出立體陰影感 */
            border-radius: 15px;
            font-size: 2.2rem; /* 超大數字按鈕 */
            font-weight: bold;
            color: #713f12;
            padding: 15px 0;
            cursor: pointer;
            transition: transform 0.1s, border-bottom 0.1s;
        }
        /* 按鈕按下去的立體彈跳效果 */
        .option-btn:active {
            transform: translateY(4px);
            border-bottom: 2px solid #facc15;
        }
        .option-btn:hover {
            background-color: #fef9c3;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <div class="header-bar">
            <div class="hearts">❤️ ❤️ ❤️</div>
            <div class="level-title">第 3 關：兔子吃蘿蔔</div>
            <div class="badge">⭐ x 3</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="question-box">
            <div class="story-text">🐰 幫小兔子算算看，總共有幾根蘿蔔呢？</div>
            <div class="question-text">3 × 6 = ？</div>
        </div>

        <div class="options-container">
            <button class="option-btn">12</button>
            <button class="option-btn">18</button>
            <button class="option-btn">24</button>
        </div>

    </div>

</body>
</html>
