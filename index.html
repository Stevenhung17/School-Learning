<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小冒險家的遊戲天堂 🎮</title>
    <style>
        /* 1. 滿版與活潑的星空藍底 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #e0f2fe; /* 粉藍色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 2. 遊戲大廳大卡片 */
        .hub-container {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-sizing: border-box;
            border: 6px solid #bae6fd;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 標題動畫 */
        h1 {
            color: #0c4a6e;
            font-size: 2rem;
            margin-bottom: 30px;
            font-weight: 900;
            letter-spacing: 2px;
        }

        /* 按鈕群組 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px; /* 增加按鈕之間的間距，防止誤點 */
        }

        /* 統一的 Q 彈大按鈕基礎樣式 */
        .game-btn {
            display: block;
            padding: 18px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.1s, border-bottom 0.1s;
            box-sizing: border-box;
        }

        /* 按鈕按下去的 Q 彈實體玩具感 */
        .game-btn:active {
            transform: translateY(4px);
        }

        /* 🟢 1. 九九乘法表按鈕（新加入）：亮黃色兒童風格 */
        .btn-math {
            background-color: #fef08a; /* 亮黃色 */
            color: #713f12;
            border-bottom: 6px solid #facc15;
        }
        .btn-math:hover { background-color: #fef9c3; }
        .btn-math:active { border-bottom: 2px solid #facc15; }

        /* 🔵 2. Copilot 詩詞按鈕：天藍色古風或科技感 */
        .btn-copilot {
            background-color: #38bdf8; /* 天藍色 */
            color: #0369a1;
            border-bottom: 6px solid #0284c7;
        }
        .btn-copilot:hover { background-color: #7dd3fc; }
        .btn-copilot:active { border-bottom: 2px solid #0284c7; }

        /* 🟣 3. Gemini B 詩詞按鈕：溫柔紫羅蘭色 */
        .btn-gemini {
            background-color: #c084fc; /* 紫色 */
            color: #581c87;
            border-bottom: 6px solid #a855f7;
        }
        .btn-gemini:hover { background-color: #d8b4fe; }
        .btn-gemini:active { border-bottom: 2px solid #a855f7; }

        /* 裝飾小文字 */
        .footer-note {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #64748b;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>🎮 冒險家遊戲大廳 🚀</h1>
        
        <div class="btn-group">
            <a href="Times_table_V5.html" class="game-btn btn-math">乘法挑戰賽 🚀</a>
            
            <a href="Mandarin/Copilot_Buildin_grade_Full.html" class="game-btn btn-copilot">詩詞大挑戰 - Copilot 📜</a>
            
            <a href="Mandarin/Google AI_B.html" class="game-btn btn-gemini">詩詞大挑戰 - Gemini B 🌌</a>
        </div>

        <div class="footer-note">點擊想玩的遊戲，立刻開始破關！</div>
    </div>

</body>
</html>
